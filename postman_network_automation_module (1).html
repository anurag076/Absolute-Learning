<script type="text/x-tmpl" id="m1-theory">
<h3>What is Postman?</h3>
<p>Postman is a <strong>collaborative API platform</strong> used to design, build, test, and document APIs. For network engineers, it is the GUI equivalent of writing Python <code>requests</code> code — but visual, fast, and shareable with the team.</p>
<h4>Why Postman for Network Automation?</h4>
<ul>
<li><strong>Explore APIs visually</strong> before writing Python scripts</li>
<li><strong>Test API responses</strong> with built-in assertions (JavaScript)</li>
<li><strong>Share collections</strong> — Cisco DevNet publishes ready-made Postman collections</li>
<li><strong>Document APIs</strong> automatically from your request history</li>
<li><strong>Run automated tests</strong> via Newman (CLI) inside CI/CD pipelines</li>
</ul>
<h4>Postman vs Python requests</h4>
<table class="tbl"><thead><tr><th>Feature</th><th>Postman</th><th>Python requests</th></tr></thead><tbody>
<tr><td>Auth setup</td><td>GUI dropdown</td><td>Code manually</td></tr>
<tr><td>Response view</td><td>Formatted, colour-coded JSON</td><td>print(r.json())</td></tr>
<tr><td>Variable management</td><td>Environments UI</td><td>os.environ / dict</td></tr>
<tr><td>Test assertions</td><td>JavaScript UI</td><td>assert / pytest</td></tr>
<tr><td>Team sharing</td><td>Built-in workspaces</td><td>Git repo</td></tr>
<tr><td>CI/CD automation</td><td>Newman CLI</td><td>Script directly</td></tr>
<tr><td>Learning curve</td><td>Low</td><td>Medium</td></tr>
</tbody></table>
<div class="note o"><p><strong>Key insight:</strong> Most network engineers use Postman to <em>explore and prototype</em> API calls, then translate them into Python scripts for production automation. The two tools complement each other perfectly.</p></div>
</script>

<script type="text/x-tmpl" id="m1-industry">
<h3>Postman in the Network Industry</h3>
<h4>Cisco DevNet Postman Collections</h4>
<p>Cisco publishes official Postman collections for every major platform — DNAC, Meraki, NSO, SD-WAN, FMC — on GitHub and the DevNet portal. These collections have all endpoints pre-built with variables. A network engineer can import them and start testing in minutes.</p>
<div class="note g"><p><strong>Cisco DevNet GitHub:</strong> Search "cisco devnet postman collection" to find ready-made collections for DNAC, Meraki, IOS-XE RESTCONF, FTD, SD-WAN, and more. All free and open-source.</p></div>
<h4>How Teams Use Postman</h4>
<ul>
<li><strong>Network architects</strong> — explore new vendor APIs before writing automation scripts</li>
<li><strong>Automation engineers</strong> — share tested collections with junior engineers as runbooks</li>
<li><strong>NOC teams</strong> — use Collection Runner as a quick API runbook for common tasks</li>
<li><strong>Documentation teams</strong> — publish Postman docs as API reference portals</li>
</ul>
<h4>CCNP / DevNet Certification Relevance</h4>
<div class="note y"><p><strong>Cisco DevNet Associate &amp; Professional</strong> exams explicitly test Postman knowledge: building requests, using environments, writing tests, and running Newman. It is a must-know tool for any network automation certification.</p></div>
</script>

<script type="text/x-tmpl" id="m1-practical">
<h3>Installing &amp; Setting Up Postman</h3>
<h4>Installation Options</h4>
<ul>
<li><strong>Desktop App:</strong> Download from <code>postman.com/downloads</code> (Windows, Mac, Linux)</li>
<li><strong>Web App:</strong> <code>go.postman.co</code> — no install, runs in the browser</li>
<li><strong>VS Code Extension:</strong> Postman has a VS Code plugin for inline API testing</li>
</ul>
<h4>First Launch — Your First Request</h4>
<ol>
<li>Create a free Postman account (required for sync and workspaces)</li>
<li>Create a new <strong>Workspace</strong>: <em>"Network Automation Training"</em></li>
<li>Click <strong>New → HTTP Request</strong></li>
<li>Method: GET, URL: <code>https://httpbin.org/get</code></li>
<li>Click <strong>Send</strong></li>
</ol>
<div class="umock">
  <div class="mb"><span class="mm">GET</span><span class="mu">https://httpbin.org/get</span><span class="ms">Send</span></div>
  <div class="mt"><span class="mta">Params</span><span class="mta">Auth</span><span class="mta">Headers</span><span class="mta a">Body</span><span class="mta">Tests</span></div>
  <p style="color:var(--mut);font-size:11px;margin:0">Status: <span style="color:var(--grn)">200 OK</span> &nbsp;·&nbsp; Time: 312 ms &nbsp;·&nbsp; Size: 528 B</p>
</div>
<h4>Import Official Cisco DevNet Collections</h4>
<ol>
<li>In Postman: click <strong>Import</strong> → Link or search Postman Explore for "Cisco DevNet"</li>

<li>It appears in your workspace immediately, ready to use</li>
</ol>

<script type="text/x-tmpl" id="m1-practice">
<h3>Practice &amp; Solutions</h3>
<div class="pi">
  <div class="ph" onclick="tP(this)"><div><div class="pn">Exercise 1 — Setup &amp; First Request</div><div class="pt">Installation</div></div><span class="chv">▼</span></div>
  <div class="pb" style="display:none">
    <p>Install Postman (desktop or web). Create a workspace called <em>"Network Automation"</em>. Make a GET request to <code>https://httpbin.org/get</code>. Identify the status code, response time, and your public IP in the JSON response body.</p>
    <button class="stb" onclick="tS(this)">▶ Show Solution</button>

<h3>Postman UI Components</h3>
<p>Understanding the Postman interface before building network API tests is essential. Every panel serves a specific purpose in your workflow.</p>
<h4>Main UI Areas</h4>
<table class="tbl"><thead><tr><th>Area</th><th>Location</th><th>Purpose</th></tr></thead><tbody>
<tr><td><strong>Sidebar</strong></td><td>Left panel</td><td>Collections, Environments, History navigation</td></tr>
<tr><td><strong>Request Builder</strong></td><td>Centre top</td><td>Method, URL, Params, Auth, Headers, Body, Tests</td></tr>
<tr><td><strong>Response Viewer</strong></td><td>Centre bottom</td><td>Status, Time, Size, Body, Headers, Test Results</td></tr>
<tr><td><strong>Environment Selector</strong></td><td>Top right dropdown</td><td>Switch between Dev / Staging / Prod environments</td></tr>
<tr><td><strong>Console</strong></td><td>View → Show Console</td><td>Debug scripts, see raw HTTP traffic</td></tr>
</tbody></table>
<h4>Request Builder Tabs</h4>

<h3>Real Network API Requests</h3>
<h4>RESTCONF Content-Type Matters</h4>
<p>IOS-XE RESTCONF requires a specific Content-Type: <code>application/yang-data+json</code> — NOT the usual <code>application/json</code>. Using the wrong Content-Type results in a <strong>415 Unsupported Media Type</strong> error. Postman makes it easy to set this correctly in the Headers tab.</p>
<div class="note o"><p><strong>Important for DNAC:</strong> DNAC requires the <code>X-Auth-Token</code> header (not Basic Auth) for all calls except the initial token request. After getting your token from <code>/dna/system/api/v1/auth/token</code>, paste it into a custom header. We will automate this with Pre-request Scripts in Topic 6.</p></div>
<h4>Meraki Paginated Responses</h4>
<p>Meraki limits responses to 1000 items per page. The next page URL is provided in the <code>Link</code> response header. Postman's response header tab makes it easy to spot and follow pagination links during API exploration.</p>
<h4>DNAC Query Parameters</h4>
<p>The DNAC device inventory endpoint supports multiple query parameters to filter results. Using Postman's Params tab, you can toggle filters like <code>family=Switches+and+Hubs</code> and <code>limit=10</code> without editing the URL string manually.</p>
</script>

<script type="text/x-tmpl" id="m4-theory">
<h3>Authentication Types in Postman</h3>
<p>Postman's Auth tab provides a GUI for all major authentication methods. Instead of manually building Authorization headers, you select the type and fill in the fields — Postman handles encoding and header injection automatically.</p>
<table class="tbl"><thead><tr><th>Auth Type</th><th>Postman Fields</th><th>Network Platform</th></tr></thead><tbody>
<tr><td><strong>No Auth</strong></td><td>None</td><td>Public APIs, custom header auth</td></tr>
<tr><td><strong>Basic Auth</strong></td><td>Username, Password</td><td>IOS-XE RESTCONF, IOS-XR</td></tr>
<tr><td><strong>Bearer Token</strong></td><td>Token value</td><td>Cisco DNAC, FMC, Juniper Apstra</td></tr>
<tr><td><strong>API Key</strong></td><td>Key, Value, Add to (Header/Query)</td><td>Cisco Meraki, Mist AI</td></tr>
<tr><td><strong>OAuth 2.0</strong></td><td>Client ID, Secret, Token URL</td><td>Webex, SD-WAN, cloud platforms</td></tr>
</tbody></table>
<h4>Inherit Auth from Parent (Key Feature)</h4>
<p>Collections and folders can have a <strong>default auth setting</strong>. Individual requests set to <em>"Inherit auth from parent"</em> automatically use the collection-level auth — no need to repeat auth config in every single request. Change it once at the top, all requests are updated.</p>
</script>

<script type="text/x-tmpl" id="m4-industry">
<h3>Auth Patterns for Real Network Platforms</h3>
<h4>Cisco DNAC — Token Auth Pattern</h4>
<p>DNAC requires a two-step process: POST credentials once to get a JWT token, then use that token in every subsequent call via the <code>X-Auth-Token</code> header. Tokens expire after 60 minutes.</p>
<h4>Cisco Meraki — API Key Pattern</h4>
<p>Meraki uses a static API key generated from the Dashboard. The key is passed in the <code>X-Cisco-Meraki-API-Key</code> header. Meraki enforces rate limiting at 10 requests/second per organisation — exceeding this returns 429.</p>
<div class="note o"><p><strong>Collection-Level Auth Strategy:</strong> Set auth at Collection level. All requests inherit it automatically. For DNAC, put the Bearer Token at collection level — when the token changes (expires), update it in ONE place and all 50 requests in the collection update instantly.</p></div>
<h4>Security Best Practices</h4>
<ul>
<li>Always use the <strong>Current Value</strong> column for real credentials — Current Value is never synced to Postman cloud</li>
<li>Put placeholder text like <code>ENTER_TOKEN_HERE</code> in Initial Value (shared with team)</li>
<li>Never put production passwords in Initial Value — teammates can see it</li>
</ul>
</script>

<script type="text/x-tmpl" id="m5-theory">
<h3>Environments &amp; Variables</h3>
<p>Variables allow you to write requests once and run them against different targets by simply switching the active environment. This is the most powerful workflow feature in Postman for network teams.</p>
<h4>Variable Scopes (Highest to Lowest Priority)</h4>
<table class="tbl"><thead><tr><th>Scope</th><th>Set In</th><th>Use Case</th></tr></thead><tbody>
<tr><td><strong>Local</strong></td><td>Pre-request script</td><td>Computed values for current request only</td></tr>
<tr><td><strong>Environment</strong></td><td>Environment panel</td><td>Host, credentials per environment</td></tr>
<tr><td><strong>Collection</strong></td><td>Collection → Variables</td><td>Base URLs, shared config for the collection</td></tr>
<tr><td><strong>Global</strong></td><td>Globals panel</td><td>Rarely used — too broad scope</td></tr>
<tr><td><strong>Data</strong></td><td>CSV/JSON file</td><td>Bulk testing in Collection Runner only</td></tr>
</tbody></table>
<h4>Variable Syntax</h4>
<ul>
<li>Reference a variable anywhere: <code>{{variable_name}}</code></li>
<li>In URL: <code>{{base_url}}/restconf/data/ietf-interfaces:interfaces</code></li>
<li>In headers: <code>{{content_type}}</code></li>
<li>In scripts: <code>pm.environment.get("base_url")</code></li>
<li>Set from script: <code>pm.environment.set("token", value)</code></li>
</ul>
</script>

<script type="text/x-tmpl" id="m5-industry">
<h3>Environments for Network Teams</h3>
<h4>Environment-per-Platform Strategy</h4>
<p>Create a separate Postman environment for each network platform or lab target. Switch environments to run the same collection against different devices or controllers:</p>
<div class="note g"><p><strong>Recommended environments for a network team:</strong><br>
• <em>DNAC-Lab</em> — DevNet sandbox credentials<br>
• <em>DNAC-Staging</em> — pre-production controller<br>
• <em>DNAC-Production</em> — read-only token<br>
• <em>IOS-XE-Sandbox</em> — DevNet always-on sandbox<br>
• <em>Meraki-DevNet</em> — sandbox API key</p></div>
<h4>Initial Value vs Current Value — Critical Security Rule</h4>
<p>Postman environments have two value columns. Understanding the difference prevents credential leakage:</p>
<div class="note y"><p><strong>Security Rule:</strong> <em>Initial Value</em> is synced to Postman cloud and shared with team members. <em>Current Value</em> is local only and never synced. Always put real passwords and API keys in <strong>Current Value only</strong>. Put placeholder text like <code>ENTER_TOKEN_HERE</code> in Initial Value.</p></div>
</script>

<script type="text/x-tmpl" id="m5-flow">
<h3>Variable Resolution Order</h3>
<div class="fb">
  <p style="color:var(--mut);font-size:12px;margin-bottom:8px">When Postman sees <code>{{token}}</code>, it checks in this order:</p>
  <div class="fr"><div class="fn2 r">1. Local scope (pre-request set)</div><div class="fa">→ not found →</div></div>
  <div class="fr"><div class="fn2 y">2. Environment (active env vars)</div><div class="fa">→ not found →</div></div>
  <div class="fr"><div class="fn2">3. Collection (collection variables)</div><div class="fa">→ not found →</div></div>
  <div class="fr"><div class="fn2 b">4. Global (global variables)</div><div class="fa">→ not found →</div><div class="fn2 r">Unresolved! (shown in red)</div></div>
</div>
<h4>Chaining Variables Between Requests</h4>
<div class="fb">
  <div class="fr"><div class="fn2 b">Request 1: GET all devices</div><div class="fa">→</div><div class="fn2">Tests: save first device.id to env var "device_id"</div></div>
  <div style="height:6px"></div>
  <div class="fr"><div class="fn2 g">Request 2: GET /network-device/{{device_id}}</div><div class="fa">→</div><div class="fn2">Uses the saved ID automatically</div></div>
</div>
</script>

<!-- ── TOPIC 6 ── -->
<script type="text/x-tmpl" id="m6-theory">
<h3>JavaScript in Postman</h3>
<p>Postman provides two JS execution hooks per request: <strong>Pre-request Script</strong> runs before the request is sent, and <strong>Tests</strong> runs after the response arrives. Both use the <code>pm</code> (Postman) API object.</p>
<h4>Pre-request Script Use Cases</h4>
<ul>
<li>Auto-generate auth tokens before each request</li>
<li>Set timestamps or computed values as variables</li>
<li>Generate dynamic payloads (unique interface names, random IPs)</li>
<li>Conditionally skip requests based on environment state</li>
</ul>
<h4>Tests (Assertions) Use Cases</h4>
<ul>
<li>Assert status code is 200 / 201 / 204</li>
<li>Assert response body contains expected fields or values</li>
<li>Assert response time is under a threshold (SLA)</li>
<li>Extract and save data to environment variables for chaining</li>
</ul>
<h4>pm API Quick Reference</h4>
<table class="tbl"><thead><tr><th>Method</th><th>Purpose</th></tr></thead><tbody>
<tr><td><code>pm.response.json()</code></td><td>Parse response body as JSON</td></tr>
<tr><td><code>pm.response.code</code></td><td>HTTP status code (number)</td></tr>
<tr><td><code>pm.response.responseTime</code></td><td>Response time in milliseconds</td></tr>
<tr><td><code>pm.environment.set(k, v)</code></td><td>Set an environment variable</td></tr>
<tr><td><code>pm.environment.get(k)</code></td><td>Read an environment variable</td></tr>
<tr><td><code>pm.test(name, fn)</code></td><td>Define a named test assertion</td></tr>
<tr><td><code>pm.expect(value)</code></td><td>Chai.js BDD assertion chain</td></tr>
<tr><td><code>pm.sendRequest(opts, cb)</code></td><td>Make a sub-request from a script</td></tr>
</tbody></table>
</script>

<script type="text/x-tmpl" id="m6-industry">
<h3>Scripts in Network Automation Workflows</h3>
<h4>Auto Token Refresh — Most Valuable Pattern</h4>
<p>The most useful pre-request script for network engineers: automatically fetch a fresh DNAC/FMC token before each API call. This eliminates manual copy-paste of tokens and handles expiry transparently.</p>
<div class="note o"><p><strong>Industry Pattern:</strong> Cisco DevNet's official DNAC Postman collection uses this exact pattern — a pre-request script at the <em>collection level</em> that auto-authenticates before every request. Once set up, you never manually manage tokens again.</p></div>
<h4>Test Assertions in Network Context</h4>
<p>Writing Postman tests for network APIs lets you validate that:</p>
<ul>
<li>All expected devices are present in the inventory response</li>
<li>Interface status matches what was configured (enabled = true after PATCH)</li>
<li>Controller response time is within SLA (under 2 seconds)</li>
<li>Config changes were applied correctly — check returned body</li>
</ul>
</script>

<script type="text/x-tmpl" id="m6-practical">
<h3>Pre-request Scripts &amp; Tests Code</h3>
<div class="cb"><div class="ch"><span class="lg">JavaScript</span><span class="fn">Collection Pre-request Script — Auto DNAC Token</span></div><pre><span class="cm">// Runs BEFORE every request in the collection
// Fetches a new DNAC token if missing or expired</span>

<span class="kw">const</span> tokenExpiry = pm.environment.<span class="fn">get</span>(<span class="st">"token_expiry"</span>);
<span class="kw">const</span> now         = Date.<span class="fn">now</span>();
<span class="kw">const</span> needsToken  = !pm.environment.<span class="fn">get</span>(<span class="st">"dnac_token"</span>)
                   || now &gt; parseInt(tokenExpiry || 0);

<span class="kw">if</span> (needsToken) {
    <span class="kw">const</span> baseUrl  = pm.environment.<span class="fn">get</span>(<span class="st">"base_url"</span>);
    <span class="kw">const</span> username = pm.environment.<span class="fn">get</span>(<span class="st">"username"</span>);
    <span class="kw">const</span> password = pm.environment.<span class="fn">get</span>(<span class="st">"password"</span>);
    <span class="kw">const</span> creds    = <span class="fn">btoa</span>(username + <span class="st">":"</span> + password);

    pm.<span class="fn">sendRequest</span>({
        url    : baseUrl + <span class="st">"/dna/system/api/v1/auth/token"</span>,
        method : <span class="st">"POST"</span>,
        header : { <span class="st">"Authorization"</span>: <span class="st">"Basic "</span> + creds }
    }, <span class="kw">function</span>(err, res) {
        <span class="kw">if</span> (!err) {
            <span class="kw">const</span> token = res.<span class="fn">json</span>().Token;
            pm.environment.<span class="fn">set</span>(<span class="st">"dnac_token"</span>, token);
            pm.environment.<span class="fn">set</span>(<span class="st">"token_expiry"</span>, Date.<span class="fn">now</span>() + 3300000);
            console.<span class="fn">log</span>(<span class="st">"Token refreshed OK"</span>);
        }
    });
}</pre></div>
<div class="cb"><div class="ch"><span class="lg">JavaScript</span><span class="fn">Tests Tab — Network API Assertions</span></div><pre><span class="cm">// Test 1: Status code is 200</span>
pm.<span class="fn">test</span>(<span class="st">"Status is 200 OK"</span>, <span class="kw">function</span>() {
    pm.response.to.have.<span class="fn">status</span>(200);
});

<span class="cm">// Test 2: Response time under 2 seconds (SLA)</span>
pm.<span class="fn">test</span>(<span class="st">"Response under 2s SLA"</span>, <span class="kw">function</span>() {
    pm.<span class="fn">expect</span>(pm.response.responseTime).to.be.<span class="fn">below</span>(2000);
});

<span class="cm">// Test 3: Response body has expected keys</span>
pm.<span class="fn">test</span>(<span class="st">"Response has device list"</span>, <span class="kw">function</span>() {
    <span class="kw">const</span> json = pm.response.<span class="fn">json</span>();
    pm.<span class="fn">expect</span>(json).to.have.<span class="fn">property</span>(<span class="st">"response"</span>);
    pm.<span class="fn">expect</span>(json.response).to.be.<span class="fn">an</span>(<span class="st">"array"</span>);
    pm.<span class="fn">expect</span>(json.response.length).to.be.<span class="fn">above</span>(0);
});

<span class="cm">// Test 4: Save first device ID to environment</span>
<span class="kw">const</span> devices = pm.response.<span class="fn">json</span>().response;
<span class="kw">if</span> (devices &amp;&amp; devices.length &gt; 0) {
    pm.environment.<span class="fn">set</span>(<span class="st">"first_device_id"</span>, devices[0].id);
    pm.<span class="fn">test</span>(<span class="st">"First device reachable"</span>, <span class="kw">function</span>() {
        pm.<span class="fn">expect</span>(devices[0].reachabilityStatus).to.<span class="fn">equal</span>(<span class="st">"Reachable"</span>);
    });
}</pre></div>
</script>

<script type="text/x-tmpl" id="m6-flow">

</div>
</script>

<div class="pi">
  <div class="ph" onclick="tP(this)"><div><div class="pn">Exercise 3 — Auto Token Script</div><div class="pt">DNAC Collection Script</div></div><span class="chv">▼</span></div>
  <div class="pb" style="display:none">

<script type="text/x-tmpl" id="m7-theory">
<h3>Collections as Executable Runbooks</h3>
<p>A Postman Collection is an ordered group of requests that can be run sequentially as an automated workflow. For network teams, collections serve as executable runbooks — repeatable procedures for common network operations.</p>
<h4>Collection Structure</h4>
<ul>
<li><strong>Collection</strong> (top level) — the full runbook (e.g., "Network Health Check")</li>
<li><strong>Folders</strong> — logical phases (e.g., "Authentication", "Inventory", "Compliance")</li>
<li><strong>Requests</strong> — individual API calls in execution order</li>
</ul>
<h4>Collection Runner Features</h4>
<table class="tbl"><thead><tr><th>Feature</th><th>Purpose</th></tr></thead><tbody>
<tr><td>Sequence control</td><td>Run all requests in order, or select specific ones</td></tr>
<tr><td>Iterations</td><td>Run the collection N times (e.g., for N devices)</td></tr>
<tr><td>Data files</td><td>Inject CSV/JSON to parametrise each iteration</td></tr>
<tr><td>Delay</td><td>Wait N ms between requests (for rate limiting)</td></tr>
<tr><td>Test results</td><td>Pass/Fail summary report for all assertions</td></tr>
<tr><td>Export</td><td>JSON/HTML report of full run results</td></tr>
</tbody></table>
</script>

<script type="text/x-tmpl" id="m7-industry">

<script type="text/x-tmpl" id="m7-practical">
<h3>Building a Network Health Check Collection</h3>
<div class="cb"><div class="ch"><span class="lg">Collection Structure</span><span class="fn">Network Health Check</span></div><pre>📁 Network Health Check
  📁 01 - Authentication
      🔹 POST Get DNAC Token      (Tests: save token to env var)
  📁 02 - Inventory
      🔹 GET All Devices          (Tests: count &gt; 0)
      🔹 GET Unreachable Devices  (Tests: assert count = 0)
  📁 03 - Health Scores
      🔹 GET Client Health        (Tests: score &gt; 80)
      🔹 GET Network Health       (Tests: score &gt; 90)
  📁 04 - Interface Audit
      🔹 GET Interface Status     (Tests: no errored interfaces)</pre></div>
<div class="cb"><div class="ch"><span class="lg">CSV</span><span class="fn">devices.csv — Data file for Collection Runner</span></div><pre>hostname,ip,expected_status
SW-CORE-01,10.1.1.1,Reachable
SW-ACCESS-01,10.1.1.2,Reachable
RT-WAN-01,10.1.1.3,Reachable</pre></div>
<div class="cb"><div class="ch"><span class="lg">JavaScript</span><span class="fn">Tests — Using CSV data variables</span></div><pre><span class="cm">// pm.iterationData = current CSV row data</span>
<span class="kw">const</span> expectedHost   = pm.iterationData.<span class="fn">get</span>(<span class="st">"hostname"</span>);
<span class="kw">const</span> expectedStatus = pm.iterationData.<span class="fn">get</span>(<span class="st">"expected_status"</span>);

pm.<span class="fn">test</span>(<span class="st">"Device reachability check"</span>, <span class="kw">function</span>() {
    <span class="kw">const</span> devices = pm.response.<span class="fn">json</span>().response;
    <span class="kw">const</span> device  = devices.<span class="fn">find</span>(<span class="kw">function</span>(d) {
        <span class="kw">return</span> d.hostname === expectedHost;

<script type="text/x-tmpl" id="m8-theory">
<h3>Newman — Postman CLI Runner</h3>
<p>Newman is the official Postman command-line runner. It executes Postman collections from the terminal — no GUI required. This enables integration with CI/CD pipelines, scheduled cron jobs, and full automation workflows.</p>
<h4>Why Newman for Network Automation?</h4>
<ul>
<li>Run API test suites automatically after network changes</li>
<li>Integrate with Jenkins, GitLab CI, GitHub Actions pipelines</li>
<li>Schedule nightly network health checks via Linux cron</li>
<li>Generate HTML and JUnit reports for compliance evidence</li>
<li>Run headlessly on automation servers — no desktop required</li>
</ul>
<div class="cb"><div class="ch"><span class="lg">Shell</span><span class="fn">Newman install &amp; basic usage</span></div><pre><span class="cm"># Install Newman globally via npm</span>
npm install -g newman
npm install -g newman-reporter-htmlextra

<span class="cm"># Basic run</span>
newman run my_collection.json

<span class="cm"># Run with environment file</span>
newman run my_collection.json -e ios_xe_sandbox.json

<span class="cm"># Run with CSV data file</span>
newman run my_collection.json -d devices.csv

<span class="cm"># Full run with HTML report</span>
newman run my_collection.json \
  -e sandbox.json \
  --reporters htmlextra \
  --reporter-htmlextra-export report.html</pre></div>
</script>

<script type="text/x-tmpl" id="m8-industry">
<h3>Newman in Network CI/CD Pipelines</h3>
<h4>Post-Change Validation Pipeline</h4>
<p>After every network change (VLAN add, route update, ACL push), Newman automatically runs a Postman collection that verifies the change was applied correctly and no unintended side effects occurred. This is Network-as-Code validation.</p>
<div class="note o"><p><strong>Pipeline flow:</strong> Git push → Ansible/Terraform applies change → Newman runs Postman collection → Tests pass → Merge approved. Tests fail → Alert sent to NOC → Rollback triggered automatically.</p></div>
<h4>CI/CD Tool Integrations</h4>
<table class="tbl"><thead><tr><th>CI/CD Tool</th><th>Integration Method</th></tr></thead><tbody>
<tr><td>Jenkins</td><td>Execute Shell step: <code>newman run ...</code></td></tr>
<tr><td>GitLab CI</td><td>Job using node:alpine image + newman install</td></tr>
<tr><td>GitHub Actions</td><td>postman/newman action in workflow YAML</td></tr>
<tr><td>Cron (Linux)</td><td>Scheduled <code>newman run ...</code> + email on failure</td></tr>
</tbody></table>
</script>

<script type="text/x-tmpl" id="m8-practical">
<h3>Newman in Practice</h3>
<div class="cb"><div class="ch"><span class="lg">Shell</span><span class="fn">Full Newman run with all options</span></div><pre><span class="cm"># Export from Postman: Collection → ⋯ → Export → v2.1
# Export environment: Environments → ⋯ → Export</span>

newman run NetworkHealthCheck.postman_collection.json \
  --environment IOS_XE_Sandbox.postman_environment.json \
  --iteration-data devices.csv \
  --delay-request 200 \
  --timeout-request 10000 \
  --reporters cli,htmlextra,junit \
  --reporter-htmlextra-export reports/health.html \
  --reporter-junit-export reports/results.xml</pre></div>
<div class="cb"><div class="ch"><span class="lg">YAML</span><span class="fn">GitLab CI — .gitlab-ci.yml</span></div><pre>network-health-test:
  stage: validate
  image: node:18-alpine
  before_script:
    - npm install -g newman newman-reporter-htmlextra
  script:
    - newman run collections/NetworkHealth.json
        --environment envs/sandbox.json
        --reporters cli,htmlextra
        --reporter-htmlextra-export report.html
  artifacts:
    paths: [report.html]
    expire_in: 7 days
  only:
    - main</pre></div>
<div class="cb"><div class="ch"><span class="lg">Shell</span><span class="fn">Cron — Nightly health check at 2am</span></div><pre><span class="cm"># Runs every night at 2am, emails NOC if tests fail</span>
0 2 * * * /usr/local/bin/newman run /opt/postman/Health.json \
  -e /opt/postman/production.json \
  --reporters htmlextra \
  --reporter-htmlextra-export /var/www/reports/$(date +\%Y\%m\%d).html \
  || mail -s "Network Health FAILED" noc@company.com &lt; /dev/null</pre></div>
</script>

<script type="text/x-tmpl" id="m10-theory">
<h3>Postman Mock Servers</h3>
<p>A Mock Server creates a simulated API endpoint that returns predefined responses. You can build and test automation scripts against a mock without needing a real device or controller.</p>
<h4>When to Use Mock Servers</h4>
<ul>
<li><strong>Learning:</strong> Practice API calls without a real sandbox or production system</li>
<li><strong>Parallel development:</strong> Develop Python scripts before the real API is ready</li>
<li><strong>Testing error scenarios:</strong> Simulate 401, 429, 503, and network timeouts</li>
<li><strong>Offline development:</strong> Work on API scripts without VPN or sandbox access</li>
<li><strong>Training labs:</strong> Give students a consistent, always-available API target</li>
</ul>
<h4>Postman API Documentation</h4>
<p>Postman auto-generates documentation from your collection. Every request becomes a documented endpoint with parameter descriptions, examples, and sample responses. Published as a live URL, it becomes a team-wide API reference that is always up to date because it is generated from the same collection used for testing.</p>
</script>

<script type="text/x-tmpl" id="m10-industry">
<h3>Mocks &amp; Documentation in Network Teams</h3>
<h4>Training Lab Use Case</h4>
<div class="note g"><p><strong>Training Scenario:</strong> Instead of relying on DevNet sandboxes (which can be slow, unreachable, or rate-limited), create a Postman mock that simulates DNAC responses. Students practice Python scripts against the mock locally — no internet required, no shared resource contention.</p></div>
<h4>Error Testing Use Case</h4>
<div class="note g"><p><strong>QA Testing:</strong> Create a mock that always returns 401, 429, or 503 to test that your Python scripts handle these edge cases correctly. Without a mock, you cannot reliably reproduce these error states on demand.</p></div>
<h4>Published Documentation</h4>
<p>Large network teams publish their Postman collection as documentation — every endpoint is documented with examples, parameters, and expected responses. New team members can immediately see all available API operations and start using them without waiting for someone to explain the API.</p>
</script>

<script type="text/x-tmpl" id="m11-theory">
<h3>Advanced Postman Scripting</h3>
<p>Beyond basic tests, Postman's JavaScript engine supports complex workflows: conditional branching, looping until a condition is met, request chaining, and response visualisation.</p>
<h4>setNextRequest — Dynamic Flow Control</h4>
<p><code>postman.setNextRequest("Request Name")</code> controls which request runs next in the Collection Runner. This enables:</p>
<ul>
<li><strong>Skipping:</strong> If device is unreachable → skip config push → jump to error handler</li>
<li><strong>Looping:</strong> Poll a task status endpoint until the task completes</li>
<li><strong>Branching:</strong> If device type is router → run router checks; if switch → run switch checks</li>
<li><strong>Stopping:</strong> <code>postman.setNextRequest(null)</code> ends the runner immediately</li>
</ul>
<h4>Visualize Tab</h4>
<p>The Visualize tab renders custom HTML and charts from response data using JavaScript. Useful for creating a quick device health dashboard view during API exploration — without building a separate tool.</p>
</script>

<script type="text/x-tmpl" id="m11-industry">
<h3>Advanced Patterns in Production Workflows</h3>
<h4>Async Operation Polling (DNAC Pattern)</h4>
<p>DNAC operations like template deployment are asynchronous — you POST the operation and receive a Task ID. You must then poll <code>GET /task/{taskId}</code> repeatedly until the task status changes from "pending" to "success" or "failed". <code>setNextRequest</code> enables this polling loop in Postman's Collection Runner.</p>
<div class="note o"><p><strong>DNAC Async Pattern in Postman:</strong><br>1. POST deploy template → receive taskId → save to env var<br>2. GET /task/{{taskId}} → check status in Tests<br>3. If status = "pending" → setNextRequest("Check Task") → loops back to step 2<br>4. If status = "success" → setNextRequest(null) → run ends successfully<br>5. If status = "failed" → setNextRequest("Handle Error") → branches to error request</p></div>
</script>

<script type="text/x-tmpl" id="m11-practical">
<h3>Advanced Scripting Examples</h3>
<div class="cb"><div class="ch"><span class="lg">JavaScript</span><span class="fn">Tests tab — Polling with setNextRequest</span></div><pre><span class="cm">// In "Check Task Status" request Tests tab</span>
<span class="kw">const</span> taskData = pm.response.<span class="fn">json</span>().response;
<span class="kw">const</span> isError  = taskData.isError;
<span class="kw">const</span> progress = taskData.progress;

<span class="kw">var</span> retries = parseInt(pm.environment.<span class="fn">get</span>(<span class="st">"poll_retries"</span>) || 0);

<span class="kw">if</span> (!isError &amp;&amp; progress !== <span class="st">"completed"</span> &amp;&amp; retries &lt; 10) {
    pm.environment.<span class="fn">set</span>(<span class="st">"poll_retries"</span>, retries + 1);
    console.<span class="fn">log</span>(<span class="st">"Polling attempt: "</span> + (retries + 1));
    postman.<span class="fn">setNextRequest</span>(<span class="st">"Check Task Status"</span>); <span class="cm">// loop back</span>

} <span class="kw">else if</span> (!isError &amp;&amp; progress === <span class="st">"completed"</span>) {
    pm.environment.<span class="fn">set</span>(<span class="st">"poll_retries"</span>, 0);
    pm.<span class="fn">test</span>(<span class="st">"Task completed"</span>, <span class="kw">function</span>() {
        pm.<span class="fn">expect</span>(<span class="kw">true</span>).to.be.<span class="kw">true</span>;
    });
    postman.<span class="fn">setNextRequest</span>(<span class="kw">null</span>); <span class="cm">// end run</span>

} <span class="kw">else</span> {
    pm.<span class="fn">test</span>(<span class="st">"Task failed"</span>, <span class="kw">function</span>() {
        pm.<span class="fn">expect</span>(isError).to.be.<span class="kw">false</span>; <span class="cm">// will fail, alerting us</span>
    });
    postman.<span class="fn">setNextRequest</span>(<span class="st">"Handle Error"</span>);
}</pre></div>
<div class="cb"><div class="ch"><span class="lg">JavaScript</span><span class="fn">Visualize tab — Device health table</span></div><pre><span class="kw">const</span> devices = pm.response.<span class="fn">json</span>().response || [];
<span class="kw">var</span> rows = <span class="st">""</span>;
devices.<span class="fn">forEach</span>(<span class="kw">function</span>(d) {
    <span class="kw">var</span> colour = d.reachabilityStatus === <span class="st">"Reachable"</span> ? <span class="st">"#3fb950"</span> : <span class="st">"#f85149"</span>;
    rows += <span class="st">"&lt;tr style='color:"</span> + colour + <span class="st">"'&gt;"</span>
          + <span class="st">"&lt;td&gt;"</span> + d.hostname + <span class="st">"&lt;/td&gt;"</span>
          + <span class="st">"&lt;td&gt;"</span> + d.managementIpAddress + <span class="st">"&lt;/td&gt;"</span>
          + <span class="st">"&lt;td&gt;"</span> + d.reachabilityStatus + <span class="st">"&lt;/td&gt;"</span>
          + <span class="st">"&lt;/tr&gt;"</span>;
});

pm.visualizer.<span class="fn">set</span>(
  <span class="st">"&lt;table border='1'&gt;&lt;tr&gt;&lt;th&gt;Host&lt;/th&gt;&lt;th&gt;IP&lt;/th&gt;&lt;th&gt;Status&lt;/th&gt;&lt;/tr&gt;"</span>
  + rows + <span class="st">"&lt;/table&gt;"</span>
);</pre></div>
</script>

<script type="text/x-tmpl" id="m11-flow">
<h3>setNextRequest Flow Control</h3>
<div class="fb">
  <div class="fr"><div class="fn2 o">POST Deploy Template → save taskId to env var</div></div>
  <div style="height:5px"></div>
  <div class="fr"><div class="fn2 b">GET /task/{{taskId}} → check status in Tests</div></div>

  <div class="fr">

</div>
</script>

<script type="text/x-tmpl" id="m12-theory">
<h3>Postman for Team Collaboration</h3>
<p>Postman Workspaces enable teams to share collections, environments, and documentation in real time. Changes sync automatically — when a team member updates a collection, everyone sees it immediately.</p>
<h4>Workspace Types</h4>
<table class="tbl"><thead><tr><th>Workspace</th><th>Access</th><th>Best For</th></tr></thead><tbody>
<tr><td><strong>Personal</strong></td><td>Only you</td><td>Learning, drafting, experimenting</td></tr>
<tr><td><strong>Team</strong></td><td>Invited members only</td><td>Shared runbooks within the network team</td></tr>
<tr><td><strong>Partner</strong></td><td>Internal + external guests</td><td>Vendor collaboration and integration projects</td></tr>
<tr><td><strong>Public</strong></td><td>Anyone on the internet</td><td>Official API documentation (Cisco DevNet uses this)</td></tr>
</tbody></table>
<h4>Version Control in Postman</h4>
<ul>
<li><strong>Fork:</strong> Create a copy of a collection to work on independently (like a Git branch)</li>
<li><strong>Pull Request:</strong> Propose changes from your fork to be merged back (like a Git PR)</li>
<li><strong>Diff view:</strong> Review exactly what changed before merging</li>
<li><strong>Tags/Versions:</strong> Mark milestone releases of a collection</li>
</ul>
</script>

<script type="text/x-tmpl" id="m12-industry">
<h3>Postman in Enterprise Network Teams</h3>
<div class="note o"><p><strong>Recommended Team Structure:</strong><br>
• One Team Workspace per network platform (DNAC, Meraki, IOS-XE)<br>
• Senior engineers own and maintain the main collections<br>
• Junior engineers fork → make changes → submit Pull Request for review<br>
• CI/CD (Newman) runs against the main collection on every merge<br>
• Published documentation auto-updates from the collection</p></div>
<h4>Postman + Git Workflow</h4>
<p>Collections exported as JSON can be stored in Git alongside Ansible playbooks and Terraform configs — the same Infrastructure-as-Code repository. This gives full version history, code review via pull requests, and CI integration for every change.</p>
<h4>Postman Monitors</h4>
<p>Monitors run collections on a schedule (every 5 minutes to daily) from Postman's cloud infrastructure. This provides continuous API health monitoring — you receive alerts when any network API endpoint goes down or starts returning errors, without building a separate monitoring system.</p>
</script>

<script type="text/x-tmpl" id="m12-practical">
<h3>CI/CD Full Integration Example</h3>
<div class="cb"><div class="ch"><span class="lg">YAML</span><span class="fn">GitHub Actions — Full network validation pipeline</span></div><pre>name: Network API Validation

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'    # Nightly at 2am

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Network Health Checks
        env:
          DNAC_PASS: ${{ secrets.DNAC_PASSWORD }}
        run: |
          sed -i "s/DNAC_PASS_PLACEHOLDER/$DNAC_PASS/g" envs/prod.json
          newman run collections/NetworkHealth.json \
            --environment envs/prod.json \
            --reporters cli,htmlextra,junit \
            --reporter-htmlextra-export reports/health.html \
            --reporter-junit-export reports/results.xml

      - name: Upload Test Reports
        uses: actions/upload-artifact@v3
        with:
          name: network-health-report
          path: reports/

      - name: Alert on Failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -d '{"text":"Network health check FAILED!"}'</pre></div>
</script>

<script>
/* ── Module metadata (no HTML content here — stored in templates above) ── */
var M = [
  {id:1,  title:"Introduction to Postman",           level:"basic"},
  {id:2,  title:"Postman Interface Deep Dive",        level:"basic"},
  {id:3,  title:"HTTP Requests in Postman",           level:"basic"},
  {id:4,  title:"Authentication in Postman",          level:"basic"},
  {id:5,  title:"Environments & Variables",           level:"intermediate"},
  {id:6,  title:"Pre-request Scripts & Tests",        level:"intermediate"},
  {id:7,  title:"Collections & Collection Runner",    level:"intermediate"},
  {id:8,  title:"Newman – CLI Runner",                level:"intermediate"},
  {id:9,  title:"Postman for Network APIs",           level:"intermediate"},
  {id:10, title:"Mock Servers & Documentation",       level:"advanced"},
  {id:11, title:"Advanced Workflows & Scripting",     level:"advanced"},
  {id:12, title:"Team Collaboration & CI/CD",         level:"advanced"}
];

var cur = 0;
var curTab = 'theory';
var TABS = ['theory','industry','practical','flow','practice'];

/* ── Get content from inert template elements ── */
function getSection(id, section) {
  var el = document.getElementById('m' + id + '-' + section);
  return el ? el.textContent : '<p style="color:var(--mut)">Content not found.</p>';
}

/* ── Render sidebar list ── */
function renderSidebar() {
  var html = '';
  for (var i = 0; i < M.length; i++) {
    var m = M[i];
    html += '<div class="ti' + (i === cur ? ' active' : '') + '" onclick="selectTopic(' + i + ')">'
          + '<span class="tn">' + String(m.id).padStart(2,'0') + '</span>'
          + '<span class="tt">' + m.title + '</span>'
          + '<span class="lbg lb-' + m.level + '">' + m.level + '</span>'
          + '</div>';
  }
  document.getElementById('tlist').innerHTML = html;
}

/* ── Render main content ── */
function renderContent() {
  var m = M[cur];
  document.getElementById('ttl').textContent = m.title;
  var lb = document.getElementById('tlvl');
  lb.textContent = m.level;
  lb.className = 'lbg lb-' + m.level;
  lb.style.display = 'inline-block';
  for (var i = 0; i < TABS.length; i++) {
    document.getElementById(TABS[i]).innerHTML = getSection(m.id, TABS[i]);
  }
  document.getElementById('sft').textContent = 'Topic ' + m.id + ' of ' + M.length + '  ·  ' + m.level;
}

/* ── Select a topic ── */
function selectTopic(i) {
  cur = i;
  renderSidebar();
  renderContent();
  switchTab('theory');
  document.getElementById('ct').scrollTop = 0;
  closeSidebar();
}

/* ── Switch content tab ── */
function switchTab(tab) {
  curTab = tab;
  var secs = document.querySelectorAll('.sec');
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < secs.length; i++) { secs[i].classList.remove('active'); }
  for (var i = 0; i < tabs.length; i++) { tabs[i].classList.remove('active'); }
  document.getElementById(tab).classList.add('active');
  var tabIdx = TABS.indexOf(tab);
  if (tabIdx >= 0) { tabs[tabIdx].classList.add('active'); }
  document.getElementById('ct').scrollTop = 0;
}

/* ── Wire tab clicks ── */
document.querySelectorAll('.tab').forEach(function(el) {
  el.addEventListener('click', function() { switchTab(el.getAttribute('data-tab')); });
});

/* ── Practice accordion toggle ── */
function tP(header) {
  var body = header.nextElementSibling;
  var chev = header.querySelector('.chv');
  var isOpen = body.style.display === 'block';
  body.style.display = isOpen ? 'none' : 'block';
  if (chev) { chev.classList.toggle('op', !isOpen); }
}

/* ── Solution toggle ── */
function tS(btn) {
  var box = btn.nextElementSibling;
  var isOpen = box.classList.contains('open');
  box.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '▶ Show Solution' : '▼ Hide Solution';
}

/* ── Mobile sidebar ── */
function openSidebar()  { document.getElementById('sb').classList.add('open'); document.getElementById('ovl').classList.add('open'); }
function closeSidebar() { document.getElementById('sb').classList.remove('open'); document.getElementById('ovl').classList.remove('open'); }
document.getElementById('hbg').addEventListener('click', function() {
  document.getElementById('sb').classList.contains('open') ? closeSidebar() : openSidebar();
});
document.getElementById('ovl').addEventListener('click', closeSidebar);

/* ── Init ── */
renderSidebar();
renderContent();
</script>
</body>
</html>
