<!-- ═══════════ TOPIC 12 ═══════════ -->
<script type="text/x-tmpl" id="m12-theory">
<h3>Putting It All Together — Real Network Automation Pipelines</h3>
<p>A real network automation pipeline reads data from multiple sources, transforms it, validates it, and acts on it. This final topic ties everything together in a realistic scenario that uses JSON, XML, and YAML in one workflow.</p>
<h4>The Full Data Flow</h4>
<div class="g2">
  <div class="card"><h5>Input Sources</h5><p>YAML inventory (intent), JSON API (actual state), XML NETCONF (device config)</p></div>
  <div class="card"><h5>Processing</h5><p>Parse, validate, compare, enrich, transform in pure Python</p></div>
  <div class="card"><h5>Actions</h5><p>Push changes via REST API (JSON payload) or NETCONF (XML edit-config)</p></div>
  <div class="card"><h5>Output</h5><p>YAML/JSON report, CSV for management, notification webhook</p></div>
</div>
<h4>The Automation Engineer Mindset</h4>
<ul>
<li>You don't care what format the data arrives in — you parse it to Python immediately</li>
<li>You don't care what format the device needs — you build the right structure and serialise</li>
<li>The Python dict is your workspace. Formats are just the door in and the door out</li>
<li>Always validate before acting. Always log what happened. Always handle errors gracefully</li>
</ul>
</script>

<script type="text/x-tmpl" id="m12-industry">
<h3>Full Pipeline Example — VLAN Compliance Check</h3>
<p>Here's a real scenario you might be asked to build as a network automation engineer:</p>
<p><strong>Goal:</strong> Check that every campus switch has exactly the VLANs it's supposed to have (from YAML intent), and report any differences. No manual device login, fully automated.</p>
<div class="note g"><p><strong>Steps:</strong><br>1. Load intended VLAN list per switch from YAML inventory<br>2. Query each switch via RESTCONF (JSON) to get actual VLANs<br>3. Compare intended vs actual<br>4. Generate a compliance report (YAML for engineers, JSON for ticketing system)<br>5. If differences found → alert via webhook (JSON payload to Slack/Teams)</p></div>
<div class="note yc"><p><strong>This kind of script typically runs in CI/CD</strong> every time someone proposes a network change — it checks that the proposed YAML change doesn't violate any existing policies, and after deployment it verifies the change took effect as expected.</p></div>
</script>

<script type="text/x-tmpl" id="m12-practical">
<h3>Full Pipeline Script</h3>
<div class="cb"><div class="ch"><span class="lg py">Python</span><span class="fn">vlan_compliance_pipeline.py</span></div><pre><span class="kw">import</span> requests, yaml, json, ipaddress, sys
requests.packages.urllib3.<span class="fn">disable_warnings</span>()

<span class="cm"># ─── Step 1: Load and validate intent (YAML) ─────────</span>
<span class="kw">with</span> <span class="fn">open</span>(<span class="st">"inventory.yaml"</span>) <span class="kw">as</span> f:
    intent = yaml.<span class="fn">safe_load</span>(f)

<span class="cm"># Simple validation</span>
<span class="kw">for</span> d <span class="kw">in</span> intent[<span class="st">"devices"</span>]:
    <span class="kw">if</span> <span class="st">"hostname"</span> <span class="kw">not in</span> d <span class="kw">or</span> <span class="st">"vlans"</span> <span class="kw">not in</span> d:
        <span class="fn">print</span>(f<span class="st">"Invalid entry in YAML: {d}"</span>); sys.<span class="fn">exit</span>(<span class="nm">1</span>)

<span class="cm"># ─── Step 2: Fetch actual VLANs via API ──────────────</span>
BASE = <span class="st">"https://sandbox-iosxe-latest-1.cisco.com/restconf/data"</span>
AUTH = (<span class="st">"developer"</span>, <span class="st">"C1sco12345"</span>)
HDR  = {<span class="st">"Accept"</span>: <span class="st">"application/yang-data+json"</span>}

<span class="kw">def</span> <span class="fn">get_actual_vlans</span>(hostname):
    <span class="kw">try</span>:
        url = f<span class="st">"{BASE}/Cisco-IOS-XE-vlan:vlans"</span>
        r = requests.<span class="fn">get</span>(url, auth=AUTH, headers=HDR, verify=<span class="kw">False</span>, timeout=<span class="nm">10</span>)
        <span class="kw">if</span> r.status_code != <span class="nm">200</span>:
            <span class="kw">return</span> <span class="kw">None</span>
        vlan_data = r.<span class="fn">json</span>().<span class="fn">get</span>(<span class="st">"Cisco-IOS-XE-vlan:vlans"</span>, {})
        vlan_list = vlan_data.<span class="fn">get</span>(<span class="st">"vlan"</span>, [])
        <span class="kw">return</span> {int(v[<span class="st">"id"</span>]) <span class="kw">for</span> v <span class="kw">in</span> (<span class="fn">ensure_list</span>(vlan_list))}
    <span class="kw">except</span> Exception <span class="kw">as</span> e:
        <span class="fn">print</span>(f<span class="st">"Could not reach {hostname}: {e}"</span>)
        <span class="kw">return</span> <span class="kw">None</span>

<span class="kw">def</span> <span class="fn">ensure_list</span>(x):
    <span class="kw">return</span> x <span class="kw">if isinstance</span>(x, list) <span class="kw">else</span> [x] <span class="kw">if</span> x <span class="kw">else</span> []

<span class="cm"># ─── Step 3: Compare intent vs actual ────────────────</span>
report = []
<span class="kw">for</span> device <span class="kw">in</span> intent[<span class="st">"devices"</span>]:
    hostname     = device[<span class="st">"hostname"</span>]
    intended     = <span class="fn">set</span>(device.<span class="fn">get</span>(<span class="st">"vlans"</span>, []))
    actual       = <span class="fn">get_actual_vlans</span>(hostname) <span class="kw">or</span> <span class="fn">set</span>()
    missing      = intended - actual   <span class="cm"># should be there, isn't</span>
    extra        = actual - intended   <span class="cm"># there but shouldn't be</span>
    compliant    = <span class="kw">not</span> missing <span class="kw">and not</span> extra

    report.<span class="fn">append</span>({
        <span class="st">"hostname"</span>  : hostname,
        <span class="st">"compliant"</span> : compliant,
        <span class="st">"intended"</span>  : <span class="fn">sorted</span>(intended),
        <span class="st">"actual"</span>    : <span class="fn">sorted</span>(actual),
        <span class="st">"missing"</span>   : <span class="fn">sorted</span>(missing),
        <span class="st">"extra"</span>     : <span class="fn">sorted</span>(extra)
    })
    status = <span class="st">"COMPLIANT"</span> <span class="kw">if</span> compliant <span class="kw">else</span> <span class="st">"DRIFT DETECTED"</span>
    <span class="fn">print</span>(f<span class="st">"[{status}] {hostname}: missing={sorted(missing)} extra={sorted(extra)}"</span>)

<span class="cm"># ─── Step 4: Save reports in multiple formats ─────────</span>
<span class="kw">with</span> <span class="fn">open</span>(<span class="st">"compliance_report.json"</span>, <span class="st">"w"</span>) <span class="kw">as</span> f:
    json.<span class="fn">dump</span>(report, f, indent=<span class="nm">2</span>)

<span class="kw">with</span> <span class="fn">open</span>(<span class="st">"compliance_report.yaml"</span>, <span class="st">"w"</span>) <span class="kw">as</span> f:
    yaml.<span class="fn">dump</span>({<span class="st">"vlan_compliance"</span>: report}, f, default_flow_style=<span class="kw">False</span>)

<span class="fn">print</span>(<span class="st">"Reports saved: compliance_report.json + compliance_report.yaml"</span>)</pre></div>
</script>

function switchTab(tab) {
  var secs = document.querySelectorAll('.sec');

  for (var i = 0; i < secs.length; i++) secs[i].classList.remove('active');

  document.getElementById('ct').scrollTop = 0;
}
